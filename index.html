<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Legacy - Test League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Anybody:wght@400;600;700;800&family=Hanken+Grotesk:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ffe4af',
              'primary-fixed': '#ffdf9e',
              'primary-fixed-dim': '#fabd00',
              'primary-container': '#ffc107',
              'primary-fixed-variant': '#5b4300',
              secondary: '#ffb5a0',
              'secondary-container': '#d73b00',
              tertiary: '#aef2ff',
              'tertiary-fixed': '#00dff8',
              'tertiary-fixed-dim': '#00daf3',
              background: '#131314',
              surface: '#131314',
              'surface-container': '#201f20',
              'surface-container-high': '#2a2a2b',
              'surface-container-low': '#1c1b1c',
              'surface-container-lowest': '#0e0e0f',
              'surface-container-highest': '#353436',
              'surface-tint': '#fabd00',
              'surface-variant': '#353436',
              'on-surface': '#e5e2e3',
              'on-surface-variant': '#d4c5ab',
              'on-tertiary': '#00363d',
              'on-tertiary-fixed': '#004f58',
              'on-primary': '#3f2e00',
              'on-primary-fixed': '#261a00',
              'on-primary-container': '#6d5100',
              'on-primary-fixed-variant': '#5b4300',
              'on-tertiary-container': '#005e6a',
              'on-tertiary-fixed-variant': '#004f58',
              'on-secondary': '#5f1500',
              'on-secondary-fixed': '#3b0900',
              'on-secondary-fixed-variant': '#862200',
              'on-secondary-container': '#fffbff',
              outline: '#9c8f78',
              obsidian: '#0a0a0a',
              'gold-accent': '#FFD700',
              'muted-gold': '#C5A059',
              'deep-card': '#111111',
              'border-subtle': '#222222',
            },
            borderRadius: {
              DEFAULT: '0.125rem',
              lg: '0.25rem',
              xl: '0.5rem',
              full: '0.75rem',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              'font-display-lg': ['anybody'],
              'display-lg': ['anybody'],
              'label-caps': ['jetbrainsMono'],
              'headline-lg': ['anybody'],
              'headline-md': ['anybody'],
              'body-lg': ['hankenGrotesk'],
              'body-md': ['hankenGrotesk'],
            },
            fontSize: {
              'label-caps': ['12px', { lineHeight: '1.0', letterSpacing: '0.1em', fontWeight: '500' }],
              'headline-md': ['24px', { lineHeight: '1.3', fontWeight: '600' }],
              'headline-lg': ['48px', { lineHeight: '1.2', letterSpacing: '0.02em', fontWeight: '700' }],
              'body-lg': ['18px', { lineHeight: '1.6', fontWeight: '400' }],
              'body-md': ['16px', { lineHeight: '1.6', fontWeight: '400' }],
              'headline-lg-mobile': ['32px', { lineHeight: '1.2', fontWeight: '700' }],
              'display-lg': ['72px', { lineHeight: '1.1', letterSpacing: '-0.02em', fontWeight: '800' }],
            },
            spacing: {
              'margin-desktop': '64px',
              gutter: '32px',
              'container-max': '1440px',
              'margin-mobile': '20px',
              base: '8px',
            },
            maxWidth: {
              'container-max': '1440px',
            },
            padding: {
              base: '8px',
              gutter: '32px',
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      :root {
        --victory-gradient: linear-gradient(135deg, #ffe4af 0%, #fabd00 50%, #d73b00 100%);
        --glass-bg: rgba(20, 20, 22, 0.6);
      }
      
      @keyframes rotate-clockwise {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      
      @keyframes float-move {
        0%, 100% {
          transform: rotate(0deg) translateY(0px);
        }
        50% {
          transform: rotate(180deg) translateY(-20px);
        }
      }
      
      .rotating-circle {
        animation: float-move 25s ease-in-out infinite;
      }

      .victory-text-gradient {
        background: var(--victory-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .angled-cut {
        clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 0 100%);
      }

      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .radial-glow {
        background: radial-gradient(circle at center, rgba(250, 189, 0, 0.15) 0%, transparent 70%);
      }

      .blue-glow-hover:hover {
        box-shadow: 0 0 25px rgba(0, 223, 248, 0.4);
        border-color: #00daf3;
      }

      @keyframes pulse-slow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }

      .animate-radar {
        animation: pulse-slow 8s infinite ease-in-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
